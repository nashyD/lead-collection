<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leads · Anthony Gallant State Farm</title>
  <meta name="robots" content="noindex,nofollow" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sf: {
              red:     '#E22925',
              redDark: '#B81E1B',
              ink:     '#111111',
              gray:    '#6B7280',
              cream:   '#FDFBF7',
            },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .pill { display:inline-flex; align-items:center; gap:.25rem; padding:.125rem .5rem; border-radius:9999px; font-size:.7rem; font-weight:600; }
    .pill-new       { background:#FEE2E2; color:#B81E1B; }
    .pill-contacted { background:#FEF3C7; color:#92400E; }
    .pill-quoted    { background:#DBEAFE; color:#1E40AF; }
    .pill-bound     { background:#D1FAE5; color:#065F46; }
    .pill-lost      { background:#F3F4F6; color:#4B5563; }
    .tab[aria-pressed="true"] { background:#111; color:#fff; }
    .row-saving { background-color:#FFFBEB; }
    .row-saved  { background-color:#ECFDF5; transition: background-color 1.2s ease; }
  </style>
</head>

<body class="bg-sf-cream text-sf-ink antialiased min-h-screen">

  <!-- =========== LOGIN VIEW =========== -->
  <div id="view-login" class="hidden min-h-screen flex items-center justify-center px-5">
    <form id="login-form" class="w-full max-w-sm rounded-2xl bg-white border border-black/10 shadow-sm p-6 space-y-4">
      <div>
        <div class="text-sf-red font-extrabold tracking-tight text-lg">State Farm<sup class="text-[10px]">&reg;</sup></div>
        <h1 class="mt-2 text-2xl font-extrabold">Leads dashboard</h1>
        <p class="text-sm text-sf-ink/65">Enter the office password to continue.</p>
      </div>
      <div>
        <label for="password" class="sr-only">Password</label>
        <input id="password" name="password" type="password" required autofocus autocomplete="current-password"
          class="w-full rounded-lg border border-black/15 px-3 py-3 text-base focus:outline-none focus:border-sf-red focus:ring-2 focus:ring-sf-red/20" />
      </div>
      <button id="login-btn" type="submit"
        class="w-full rounded-lg bg-sf-red hover:bg-sf-redDark text-white font-bold py-3 transition disabled:opacity-60">
        Sign in
      </button>
      <div id="login-error" class="hidden text-sm text-sf-red text-center"></div>
    </form>
  </div>

  <!-- =========== DASHBOARD VIEW =========== -->
  <div id="view-dash" class="hidden">

    <!-- Header -->
    <header class="border-b border-black/10 bg-white sticky top-0 z-10">
      <div class="mx-auto max-w-[1500px] px-5 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="font-extrabold tracking-tight text-sf-red text-lg">State Farm<sup class="text-[10px]">&reg;</sup></span>
          <span class="text-sm text-sf-ink/55 hidden sm:inline">·</span>
          <span class="text-sm font-semibold text-sf-ink hidden sm:inline">Leads</span>
        </div>
        <div class="flex items-center gap-3">
          <button id="refresh-btn" class="text-sm font-semibold text-sf-ink/70 hover:text-sf-red">Refresh</button>
          <button id="logout-btn" class="text-sm font-semibold text-sf-ink/70 hover:text-sf-red">Log out</button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-[1500px] px-5 py-6 space-y-6">

      <!-- Stats row -->
      <section class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="rounded-xl bg-white border border-black/10 p-4">
          <div class="text-xs uppercase tracking-wide text-sf-ink/55 font-semibold">Total leads</div>
          <div id="stat-total" class="mt-1 text-2xl font-extrabold">—</div>
        </div>
        <div class="rounded-xl bg-white border border-black/10 p-4">
          <div class="text-xs uppercase tracking-wide text-sf-ink/55 font-semibold">This week</div>
          <div id="stat-week" class="mt-1 text-2xl font-extrabold">—</div>
        </div>
        <div class="rounded-xl bg-white border border-black/10 p-4">
          <div class="text-xs uppercase tracking-wide text-sf-ink/55 font-semibold">New (untouched)</div>
          <div id="stat-new" class="mt-1 text-2xl font-extrabold text-sf-red">—</div>
        </div>
        <div class="rounded-xl bg-white border border-black/10 p-4">
          <div class="text-xs uppercase tracking-wide text-sf-ink/55 font-semibold">Bound</div>
          <div id="stat-bound" class="mt-1 text-2xl font-extrabold">—</div>
        </div>
      </section>

      <!-- Pipeline board -->
      <section>
        <div id="board" class="flex gap-4 overflow-x-auto pb-3">
          <div class="text-sf-ink/55 py-10 px-1">Loading…</div>
        </div>
        <p class="text-xs text-sf-ink/45 mt-1">Change a card's <span class="font-semibold">Move to</span> dropdown to send it to another column.</p>
      </section>

    </main>
  </div>

  <!-- One pipeline column -->
  <template id="column-tpl">
    <div class="col flex-shrink-0 w-[290px]">
      <div class="flex items-center justify-between px-1 mb-2 pb-2 border-b-2 border-black/10">
        <div class="flex items-center gap-2">
          <span class="col-dot inline-block w-2.5 h-2.5 rounded-full"></span>
          <span class="col-title text-sm font-bold"></span>
        </div>
        <span class="col-count text-xs font-bold text-sf-ink/60 bg-black/[0.06] rounded-full px-2 py-0.5">0</span>
      </div>
      <div class="col-body space-y-2.5"></div>
    </div>
  </template>

  <!-- One lead card (compact, lives inside a column) -->
  <template id="lead-card-tpl">
    <article class="lead-card rounded-xl bg-white border border-black/10 p-3.5 shadow-sm" data-lead-id="">
      <div class="flex items-baseline justify-between gap-2">
        <h3 class="text-base font-bold name truncate"></h3>
        <span class="text-[11px] text-sf-ink/50 received-at flex-shrink-0"></span>
      </div>
      <div class="mt-1 text-sm space-y-0.5">
        <div class="flex items-center gap-1.5 flex-wrap">
          <a class="phone-link font-semibold text-sf-ink hover:text-sf-red" href=""></a>
          <span class="text-sf-ink/30">·</span>
          <a class="sms-link text-sf-red font-semibold hover:underline" href="">Text</a>
          <span class="text-sf-ink/30">·</span>
          <a class="call-link text-sf-red font-semibold hover:underline" href="">Call</a>
        </div>
        <div class="truncate"><a class="email-link text-sf-ink/75 hover:text-sf-red text-[13px]" href=""></a></div>
        <div class="text-[11px] text-sf-ink/50 source-line"></div>
      </div>
      <div class="mt-2.5">
        <label class="block text-[10px] font-semibold text-sf-ink/45 uppercase tracking-wide mb-1">Move to</label>
        <select class="status-select w-full rounded-lg border border-black/15 bg-white px-2.5 py-1.5 text-sm focus:outline-none focus:border-sf-red focus:ring-2 focus:ring-sf-red/20">
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="quoted">Quoted</option>
          <option value="bound">Bound</option>
          <option value="lost">Lost</option>
        </select>
      </div>
      <div class="mt-2.5">
        <textarea rows="2" class="notes-input w-full rounded-lg border border-black/15 px-2.5 py-1.5 text-[13px] focus:outline-none focus:border-sf-red focus:ring-2 focus:ring-sf-red/20" placeholder="Add a note…"></textarea>
      </div>
      <div class="mt-1.5 flex justify-end">
        <button type="button" class="delete-btn text-[11px] font-semibold text-sf-ink/40 hover:text-sf-red transition">Delete</button>
        <span class="confirm-wrap hidden items-center gap-2 text-[11px]">
          <span class="text-sf-ink/70">Delete?</span>
          <button type="button" class="confirm-yes font-bold text-sf-red hover:underline">Yes</button>
          <button type="button" class="confirm-no font-semibold text-sf-ink/55 hover:underline">Cancel</button>
        </span>
      </div>
    </article>
  </template>

  <script type="module">
    // ---------- views ----------
    const loginView = document.getElementById('view-login');
    const dashView  = document.getElementById('view-dash');
    const loginForm = document.getElementById('login-form');
    const loginErr  = document.getElementById('login-error');
    const loginBtn  = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const refreshBtn = document.getElementById('refresh-btn');
    const board      = document.getElementById('board');

    // ---------- config ----------
    const COLUMNS = [
      { key: 'new',       label: 'New',       dot: '#E22925' },
      { key: 'contacted', label: 'Contacted', dot: '#D97706' },
      { key: 'quoted',    label: 'Quoted',    dot: '#2563EB' },
      { key: 'bound',     label: 'Bound',     dot: '#059669' },
      { key: 'lost',      label: 'Lost',      dot: '#9CA3AF' },
    ];

    // ---------- state ----------
    let leads = [];          // most recent fetch, unfiltered
    let pollTimer = null;

    // ---------- bootstrap ----------
    showView('loading');
    fetchAndRender().catch(handleFetchError);

    // ---------- event wiring ----------
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginErr.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';
      try {
        const password = document.getElementById('password').value;
        const r = await fetch('/api/dashboard-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (!r.ok) {
          const { error } = await r.json().catch(() => ({}));
          throw new Error(error || `HTTP ${r.status}`);
        }
        await fetchAndRender();
      } catch (err) {
        loginErr.textContent = err.message || 'Sign in failed';
        loginErr.classList.remove('hidden');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/dashboard-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ logout: true }),
      });
      stopPolling();
      showView('login');
    });

    refreshBtn.addEventListener('click', () => fetchAndRender().catch(handleFetchError));

    // ---------- data ----------
    async function fetchAndRender() {
      const r = await fetch('/api/leads', { credentials: 'same-origin' });
      if (r.status === 401) {
        showView('login');
        return;
      }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      leads = Array.isArray(data.leads) ? data.leads : [];
      showView('dash');
      render();
      startPolling();
    }

    function handleFetchError(err) {
      console.error(err);
      showView('login');
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(async () => {
        try {
          const r = await fetch('/api/leads', { credentials: 'same-origin' });
          if (!r.ok) return;
          const data = await r.json();
          leads = Array.isArray(data.leads) ? data.leads : [];
          render();
        } catch {}
      }, 30000);
    }
    function stopPolling() { if (pollTimer) clearInterval(pollTimer); pollTimer = null; }

    // ---------- render ----------
    function render() {
      // stats (computed from the full set)
      const now = Date.now();
      const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
      document.getElementById('stat-total').textContent = leads.length;
      document.getElementById('stat-week').textContent  = leads.filter(l => new Date(l.created_at).getTime() >= weekAgo).length;
      document.getElementById('stat-new').textContent   = leads.filter(l => l.status === 'new').length;
      document.getElementById('stat-bound').textContent = leads.filter(l => l.status === 'bound').length;

      // pipeline board: one column per status, newest-first within each
      const sorted = [...leads].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const colTpl  = document.getElementById('column-tpl');
      const cardTpl = document.getElementById('lead-card-tpl');

      board.innerHTML = '';
      for (const col of COLUMNS) {
        const colNode = colTpl.content.firstElementChild.cloneNode(true);
        colNode.querySelector('.col-title').textContent = col.label;
        colNode.querySelector('.col-dot').style.background = col.dot;
        const body = colNode.querySelector('.col-body');
        const items = sorted.filter(l => l.status === col.key);
        colNode.querySelector('.col-count').textContent = items.length;

        if (items.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'text-xs text-sf-ink/35 border border-dashed border-black/15 rounded-lg py-6 text-center';
          empty.textContent = 'No leads';
          body.appendChild(empty);
        } else {
          for (const lead of items) {
            const node = cardTpl.content.firstElementChild.cloneNode(true);
            renderCard(node, lead);
            body.appendChild(node);
          }
        }
        board.appendChild(colNode);
      }
    }

    function renderCard(card, lead) {
      card.dataset.leadId = lead.id;
      card.querySelector('.name').textContent = lead.first_name || '(no name)';
      card.querySelector('.received-at').textContent = relTime(lead.created_at);

      const phoneLink = card.querySelector('.phone-link');
      phoneLink.href = `tel:${lead.phone}`;
      phoneLink.textContent = formatPhone(lead.phone);
      card.querySelector('.sms-link').href = `sms:${lead.phone}`;
      card.querySelector('.call-link').href = `tel:${lead.phone}`;

      const emailLink = card.querySelector('.email-link');
      emailLink.href = `mailto:${lead.email}`;
      emailLink.textContent = lead.email;

      const src = [lead.source, lead.medium, lead.campaign].filter(Boolean).join(' / ') || 'direct';
      card.querySelector('.source-line').textContent = src;

      const sel = card.querySelector('.status-select');
      sel.value = lead.status;
      sel.addEventListener('change', () => save(card, lead, { status: sel.value }));

      const notes = card.querySelector('.notes-input');
      notes.value = lead.notes || '';
      let dirty = false;
      notes.addEventListener('input', () => { dirty = true; });
      notes.addEventListener('blur', () => {
        if (!dirty) return;
        dirty = false;
        save(card, lead, { notes: notes.value });
      });

      // delete with two-step inline confirm
      const delBtn = card.querySelector('.delete-btn');
      const confirmWrap = card.querySelector('.confirm-wrap');
      delBtn.addEventListener('click', () => {
        delBtn.classList.add('hidden');
        confirmWrap.classList.remove('hidden');
        confirmWrap.classList.add('inline-flex');
      });
      card.querySelector('.confirm-no').addEventListener('click', () => {
        confirmWrap.classList.add('hidden');
        confirmWrap.classList.remove('inline-flex');
        delBtn.classList.remove('hidden');
      });
      card.querySelector('.confirm-yes').addEventListener('click', () => deleteLead(card, lead));
    }

    async function deleteLead(card, lead) {
      card.classList.add('row-saving');
      try {
        const r = await fetch(`/api/lead-delete?id=${encodeURIComponent(lead.id)}`, {
          method: 'DELETE',
          credentials: 'same-origin',
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        leads = leads.filter(x => x.id !== lead.id);
        render(); // rebuilds the list without the deleted card + refreshes stats
      } catch (e) {
        console.error(e);
        card.classList.remove('row-saving');
        alert('Delete failed. Try again.');
      }
    }

    async function save(card, lead, patch) {
      card.classList.add('row-saving');
      try {
        const r = await fetch('/api/lead-update', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ id: lead.id, ...patch }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        if (data.lead) Object.assign(lead, data.lead);
        // update local copy in the leads array too
        const i = leads.findIndex(x => x.id === lead.id);
        if (i >= 0) leads[i] = lead;
        // re-render: moves the card into its new column and refreshes counts
        render();
      } catch (e) {
        console.error(e);
        alert('Save failed. Try again.');
      } finally {
        card.classList.remove('row-saving');
        card.classList.add('row-saved');
        setTimeout(() => card.classList.remove('row-saved'), 1200);
      }
    }

    // ---------- helpers ----------
    function showView(which) {
      loginView.classList.toggle('hidden', which !== 'login');
      dashView.classList.toggle('hidden', which !== 'dash');
    }

    function formatPhone(e164) {
      if (!e164) return '';
      const d = e164.replace(/\D/g, '');
      if (d.length === 11 && d.startsWith('1')) {
        return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
      }
      return e164;
    }

    function relTime(iso) {
      if (!iso) return '';
      const t = new Date(iso).getTime();
      const diff = (Date.now() - t) / 1000;
      if (diff < 60)        return `${Math.floor(diff)}s ago`;
      if (diff < 3600)      return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400)     return `${Math.floor(diff/3600)}h ago`;
      if (diff < 7*86400)   return `${Math.floor(diff/86400)}d ago`;
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }
  </script>
</body>
</html>
